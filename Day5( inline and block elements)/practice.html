<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="/submit" method="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" required placeholder="Enter your name">
        </div>
        <div>
            <label for="city">City:</label>
            <input type="text" name="city" id="city" required placeholder="Enter your city">
        </div>
        <div>
            <label for="pincode">Pincode:</label>
            <input type="text" name="pincode" id="pincode" required placeholder="Enter your pincode" pattern="[0-9]{6}" title="Please enter a valid 6-digit pincode">
        </div>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
