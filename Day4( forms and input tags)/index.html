<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Forms and Input Tags</h1>
    <form action="/submit">
        <label>CV Form</label><br>
        <div>
            <label for="name">Name:</label>
            <input type="text" required name="name" id="name" placeholder="Enter your name">
        </div>
        <div>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
        </div>
        <div>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" required name="email" id="email" placeholder="Enter your email">
        </div>
        <div>
            <label for="phone">Phone:</label>
            <input type="number" required name="phone" id="phone" placeholder="Enter your phone number">
        </div>
        <div>
            <label for="address">Address:</label>
            <input type="text" required pattern="^[a-zA-Z0-9]+" name="address" id="address" placeholder="Enter your address">
        </div>
        <div>
            <label for="education">Education:</label>
            <input type="text" required name="education" id="education" placeholder="Enter your education">
        </div>
        <div>
            <label for="Degree">Degree:</label>
            <select name="Degree" id="Degree">
                <option value="Intermediate">Intermediate</option>
                <option value="Bachelors">Bachelors</option>
                <option value="Masters">Masters</option>
                <option value="PhD">PhD</option>
            </select>
        </div>
        <div>
            <label for="experience">Experience:</label>
            <input type="text" required name="experience" id="experience" placeholder="Enter your experience">
        </div>
        <div>
            <label for="dob">Date of Birth:</label>
            <input type="date" name="dob" id="dob" placeholder="Enter your date of birth">
        </div>
        <div>
            <label for="file">Upload your CV:</label>
            <input type="file" name="file" id="file">
        </div>
        <div>
            <input type="checkbox" name="terms" id="terms">
            <label for="terms">I agree to the terms and conditions</label>
        </div>
        <div>
            <input type="submit" value="Submit">
        </div><br>
        <div> 
            <label for="comment">Comment:</label><br>     
            <textarea name="comment" rows="4" cols="50">
                Enter your comment here...
            </textarea>
        </div>
    </body>
    </form>
</html>
