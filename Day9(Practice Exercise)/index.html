<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Page</title>
    <style>
        body{
            background-color: rgb(246, 255, 164);
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Media Page</h1>
        <nav>
            <span>

        <section>
            <h1>Audio Section</h1>
            <audio src="1.mp3" controls loop autoplay></audio>
            <audio src="2.mp3" controls muted></audio>
            <audio src="3.mp3" controls loop autoplay></audio>
            <audio src="4.mp3" controls loop autoplay></audio>
