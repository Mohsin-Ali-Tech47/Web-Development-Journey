<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Classes in HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Id and Classes in HTML are attributes that can be added to HTML elements to give them unique identifiers or group them together for styling and scripting purposes.
    A element may have multiple classes but only one id. The id attribute is used to uniquely identify an element, while the class attribute is used to group elements together for styling or scripting purposes. -->

    <div id="unique-element" class="common-class">This is a div element with an id and a class.</div>
    <br>
    <br>
    <br>

    <span id="span-element" class="class1">This is a span element with an id and a class.</span>
</body>
</html>
